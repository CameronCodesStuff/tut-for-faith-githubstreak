<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Streak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            color: #1a1a1a;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 600;
            color: #666;
        }

        .big-number {
            font-size: clamp(5rem, 25vw, 15rem); 
            font-weight: 900;
            line-height: 1;
        }
    </style>
</head>
<body>

    <h1>The Current Count</h1>
    <div class="big-number">42</div> /* All you need to do is change this number */

</body>
</html>
